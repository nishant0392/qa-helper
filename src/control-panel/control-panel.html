<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viewport Control</title>
    <link rel="stylesheet" href="./control-panel.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Control panel</h1>
      <p class="subtle">
        Driven by Playwright (<code>npm run view</code>). Prev/Next change the
        app viewport in the left window.
      </p>

      <!-- Prev/Next buttons -->
      <section class="row controls">
        <button id="prevBtn" type="button">Prev</button>
        <button id="nextBtn" type="button">Next</button>
      </section>

      <!-- Zoom percentage -->
      <section class="row">
        <label for="zoomInput">Zoom %</label>
        <input
          id="zoomInput"
          type="range"
          min="30"
          max="200"
          step="5"
          value="100"
        />
        <span id="zoomValue">100%</span>
      </section>

      <!-- Custom viewport size -->
      <section class="row row-custom">
        <label>Custom WxH</label>
        <div class="inline-inputs">
          <input id="customW" type="number" min="1" value="1000" />
          <span class="times">x</span>
          <input id="customH" type="number" min="1" value="721" />
        </div>
        <button id="customApply" type="button">Apply</button>
      </section>

      <section class="status">
        <div>Current:</div>
        <div id="meta">—</div>
      </section>
    </main>

    <script src="./control-panel.js"></script>
  </body>
</html>
