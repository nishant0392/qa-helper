<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Responsive Demo (No Scroll)</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden; /* no scrollbars */
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: radial-gradient(
          circle at top left,
          #00e5ff,
          #0b5cff 40%,
          #020617 75%
        );
        color: #ffffff;
        text-shadow: 0 0 14px rgba(0, 229, 255, 0.18);
      }

      .viewport-shell {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          circle at top,
          rgba(0, 229, 255, 0.22),
          #020617 70%
        );
        padding: 8px;
      }

      .device-toolbar {
        height: 38px;
        min-height: 38px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        background: #020617;
        border-bottom: 1px solid rgba(14, 165, 233, 0.85);
        color: #e0f2fe;
        font-size: 13px;
      }

      .device-toolbar-left,
      .device-toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .device-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ff2d55;
      }

      .device-dot:nth-child(2) {
        background: #ffea00;
      }

      .device-dot:nth-child(3) {
        background: #00e676;
      }

      .device-select {
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid rgba(0, 229, 255, 0.9);
        background: #020617;
        color: #f0fdff;
        font-size: 13px;
      }

      .app-frame {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .title {
        font-size: clamp(19px, 1.45vw + 1.15vh, 30px);
        font-weight: 600;
        color: #f0fdff;
      }

      .pill {
        font-size: 13px;
        padding: 5px 12px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.25);
        color: #bbf7d0;
        border: 1px solid rgba(34, 197, 94, 0.9);
      }

      .grid {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 10px;
      }

      .card {
        border-radius: 14px;
        border: 1px solid rgba(0, 229, 255, 0.55);
        background: linear-gradient(
          145deg,
          rgba(0, 229, 255, 0.25),
          rgba(147, 51, 234, 0.18) 55%,
          #020617
        );
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        height: 20vh;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: calc(2 * (1vw + 1vh));
        color: #eaffff;
      }

      .card-title {
        font-weight: 500;
        color: #87e3cd;
      }

      .card-body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: calc(3 * (1vw + 1vh));
        color: #ffffff;
        text-shadow: 0 0 14px rgba(0, 229, 255, 0.18);
      }

      /* Stacking behavior for narrow viewports inside the emulated 1920x1080 */
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport-shell">
      <div class="app-frame" id="app-frame">
        <header class="header">
          <div class="title">Responsive Preview (No Scroll)</div>
          <div class="pill">Viewport-driven layout</div>
        </header>

        <div class="grid">
          <section class="card">
            <div class="card-header">
              <span class="card-title">Primary content</span>
            </div>
            <div class="card-body">
              Main area scales with width &amp; height
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <span class="card-title">Side panel</span>
            </div>
            <div class="card-body">
              Good for navigation or secondary content
            </div>
          </section>

          <section class="card">
            <div class="card-header">
              <span class="card-title">Bottom left</span>
            </div>
            <div class="card-body">Use this card to test small widgets</div>
          </section>

          <section class="card">
            <div class="card-header">
              <span class="card-title">Bottom right</span>
            </div>
            <div class="card-body">Buttons, CTAs, or live info</div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
