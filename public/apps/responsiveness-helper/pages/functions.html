<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="functions.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="page-header">
        <h1>Functions</h1>
      </header>
      <p class="page-description">Conversion tools for responsive design.</p>

      <h2 class="section-title">1920×1080 Scale</h2>
      <p class="section-description">
        Scale pixel values (designed for 1920×1080) to the current viewport.
      </p>
      <div class="converter scale-converter">
        <div class="converter-row viewport-mode">
          <div>
            <span class="label">Type</span>
            <span
              class="info-icon"
              data-tooltip="Image: width scaled wrt 1920, height scaled wrt 1080. Text: scale by height only."
              title="Image: width scaled wrt 1920, height scaled wrt 1080. Text: scale by height only."
              aria-label="Image: width scaled wrt 1920, height scaled wrt 1080. Text: scale by height only."
              >ℹ</span
            >
          </div>
          <div class="viewport-options">
            <label class="radio-option">
              <input type="radio" name="scale-type" value="image" checked />
              Image
            </label>
            <label class="radio-option">
              <input type="radio" name="scale-type" value="text" />
              Text
            </label>
          </div>
        </div>
        <div class="converter-row scale-inputs-row" id="scale-inputs-row">
          <div class="scale-input-group" id="scale-image-inputs">
            <label for="scale-width-input">Width</label>
            <input
              type="number"
              id="scale-width-input"
              value="100"
              min="1"
              placeholder="px"
            />
            <label for="scale-height-input">Height</label>
            <input
              type="number"
              id="scale-height-input"
              value="100"
              min="1"
              placeholder="px"
            />
          </div>
          <div class="scale-input-group" id="scale-text-inputs" hidden>
            <label for="scale-pixels-input">Pixels</label>
            <input
              type="number"
              id="scale-pixels-input"
              value="16"
              min="1"
              placeholder="Enter pixels"
            />
          </div>
        </div>
        <div class="converter-row output-row">
          <label for="scale-output">Scaled for current viewport</label>
          <output id="scale-output">100 × 100 px</output>
        </div>
        <div class="converter-row output-row" id="formula-row">
          <label for="fluid-output">Formula</label>
          <output id="fluid-output">0.62 * (1vw + 1vh + 1vmin)</output>
        </div>
        <div class="converter-row output-row formula-height-row" id="formula-height-row" hidden>
          <label for="fluid-output-height">Formula (height)</label>
          <output id="fluid-output-height">0.62 * (1vw + 1vh + 1vmin)</output>
        </div>
      </div>
    </div>

    <script src="./functions.js"></script>
  </body>
</html>
