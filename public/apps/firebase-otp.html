<!DOCTYPE html>
<html>
<head>
  <title>Firebase OTP Login</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>Send OTP</h2>
  <input type="text" id="phoneNumber" placeholder="+1234567890" />
  <div id="recaptcha-container"></div>
  <button onclick="sendOTP()">Send OTP</button>

  <h2>Verify OTP</h2>
  <input type="text" id="otp" placeholder="Enter OTP" />
  <button onclick="verifyOTP()">Verify OTP</button>

  <script>
    var TOKEN =
        "eyJhcGlLZXkiOiJBSXphU3lEdFdJbVhYQUpQclJpOWswV21HOEJwY$widgetUxjeGNaTVdCREUiLCJhdXRoRG9tYWluIjoid2lkZ2V0dGVzdC03OWFhOS5maXJlYmFzZWFwcC5jb20iLCJkYXRhYmFzZVVSTCI6Imh0dHBzOi8vd2lkZ2V0dGVzdC03OWFhOS5maXJlYmFzZWlvLmNvbSIsInByb2plY3RJZCI6IndpZGdldHRlc3QtNzlhYTkiLCJzdG9yYWdlQnVja2V0Ijoid2lkZ2V0dGVzdC03OWFhOS5hcHBzcG90LmNvbSIsIm1lc3NhZ2luZ1NlbmRlcklkIjoiNzA4ODE4NzcxMDI3IiwiYXBwSWQiOiIxOjcwODgxODc3MTAyNzp3ZWI6YjMwNGQyYjM5OWJlNjdiMDgwN2FhNiJ9";
  
    // Firebase config    
    var firebaseConfig = JSON.parse(atob(TOKEN.replace("$widget", "")));

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    let confirmationResult;

    window.onload = () => {
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        size: 'invisible',
        callback: (response) => {
          console.log("reCAPTCHA solved");
        }
      });
    };

    function sendOTP() {
      const phoneNumber = document.getElementById('phoneNumber').value.trim();
      if (!/^\+[1-9]\d{1,14}$/.test(phoneNumber)) {
        alert("Enter phone number in E.164 format (e.g., +14155552671)");
        return;
      }

      auth.signInWithPhoneNumber(phoneNumber, window.recaptchaVerifier)
        .then((result) => {
          confirmationResult = result;
          alert("OTP sent!");
        })
        .catch((error) => {
          console.error("Error sending OTP:", error);
          alert(error.message);
        });
    }

    function verifyOTP() {
      const otp = document.getElementById('otp').value.trim();
      confirmationResult.confirm(otp)
        .then((result) => {
          alert("Phone number verified!");
          console.log("User:", result.user);
        })
        .catch((error) => {
          console.error("OTP verification failed:", error);
          alert("Invalid OTP.");
        });
    }
  </script>
</body>
</html>
